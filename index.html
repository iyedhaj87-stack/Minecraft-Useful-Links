<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Minecraft Wiki</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Minecraft Useful Links</h1>

        <div class="links-list">
            <a class="link-item" href="https://minecraft.wiki" target="_blank">Minecraft Wiki</a>
            <a class="link-item" href="https://minecraftservers.org" target="_blank">Minecraft Servers</a>
            
            <div class="dropdown-group">
                <a class="link-item toggle-btn" href="#">
                    Minecraft Mods <span class="arrow">▼</span>
                </a>
                <div class="sub-links">
                    <a href="https://modrinth.com/mods" target="_blank" class="sub-item modrinth-btn">Modrinth</a>
                    <a href="https://www.curseforge.com/minecraft/search?class=mc-mods" target="_blank" class="sub-item curseforge-btn">CurseForge</a>
                </div>
            </div>

            <div class="dropdown-group">
                <a class="link-item toggle-btn" href="#">
                    Minecraft Resource Packs <span class="arrow">▼</span>
                </a>
                <div class="sub-links">
                    <a href="https://modrinth.com/resourcepacks" target="_blank" class="sub-item modrinth-btn">Modrinth</a>
                    <a href="https://www.curseforge.com/minecraft/search?class=texture-packs" target="_blank" class="sub-item curseforge-btn">CurseForge</a>
                </div>
            </div>

            <div class="dropdown-group">
                <a class="link-item toggle-btn" href="#">
                    Minecraft Shader Packs <span class="arrow">▼</span>
                </a>
                <div class="sub-links">
                    <a href="https://modrinth.com/shaders" target="_blank" class="sub-item modrinth-btn">Modrinth</a>
                    <a href="https://www.curseforge.com/minecraft/search?class=shaders" target="_blank" class="sub-item curseforge-btn">CurseForge</a>
                </div>
            </div>
        
        </div>
    </div>

    <script>
        document.querySelectorAll('.toggle-btn').forEach(button => {
            button.addEventListener('click', function(e) {
                e.preventDefault();
                
                const group = this.closest('.dropdown-group');
                const subLinks = this.nextElementSibling;
                const isOpened = group.classList.contains('open');
                
                // Close all other dropdowns first
                document.querySelectorAll('.dropdown-group').forEach(el => el.classList.remove('open'));
                document.querySelectorAll('.sub-links').forEach(el => el.classList.remove('show'));
                
                // If it wasn't already open, open it now
                if (!isOpened) {
                    group.classList.add('open');
                    subLinks.classList.add('show');
                }
            });
        });
    </script>

</body>
</html>
